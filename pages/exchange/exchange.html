<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kursy walut</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&family=Jost:ital,wght@0,100..900;1,100..900&family=Pacifico&display=swap" rel="stylesheet">
    <link href="./exchange.css" rel="stylesheet">
    <link href="/styles/footer.css" rel="stylesheet">
    <link href="/styles/popups/popup.css" rel="stylesheet">
    <script src=" ./currencyChart.js" type="module"></script>
    <script src="./exchange.js" type="module"></script>
    <script src="/scripts/bootstrap.js" type="module"></script>
</head>
<body>
    <app-header></app-header>

    <main>
        <h1>💱 Kursy walut z całego świata!</h1>

        <div class="currencySearchWrapper">
            <label for="currency">Wyszukaj walutę</label><br>
            <input id="currency" name="currency" type="text" placeholder="Wyszukaj kurs waluty">
        </div>

        <div class="availableCurrencies"></div>

        <div class="exchangeRates"></div>

        <dialog id="chartDialog">
            <div class="loaderContainer" hidden>
                <div class="loader"></div>
            </div>
            
            <div class="chartBody">
                <div class="chartArea">
                    <canvas class="currencyChart"></canvas>
                </div>

                <div class="controlPanel">
                    
                    <div class="dateRangeForm">
                        <div class="inputGroup">
                            <label for="startDate">Data początkowa</label>
                            <input type="date" id="startDate">
                        </div>
                        <div class="inputGroup">
                            <label for="endDate">Data końcowa</label>
                            <input type="date" id="endDate">
                        </div>
                    </div>

                    <div class="infoSection">
                        <p class="infoLabel">Wartośc wybranego kursu</p>
                        <p class="infoSubLabel"></p>
                    </div>

                    <div class="calculatorForm">
                        <label for="chartCurrencyAmount">Wartość do przeliczenia <span class="chartCurrencyCode"></span></label>
                        <input type="number" min="0" id="chartCurrencyAmount" class="chartCurrencyAmount" placeholder="Value">
                        
                        <button class="btnPrzelicz">Przelicz</button>
                        <button class="btnKup" disabled>Kup</button>
                    </div>

                    <div class="resultSection">
                        <span class="resultLabel">Wartość waluty</span>
                        <span class="chartCurrencyValue"></span>
                    </div>

                    <button commandfor="chartDialog" command="close" class="btnClose">Zamknij</button>
                </div>

            </div>
        </dialog>
    </main>

    <footer>
        <div class="footer-inner">
            <p>&copy; 2026 NeonExchange. Wszelkie prawa zastrzeżone.</p>
        </div>
    </footer>

</body>
</html>

<template id="currencyCard">
    <div class="currencyCard">
        <span class="currencyName">
            <slot name="name">Default Name</slot>
        </span>
        <span class="currencyCode">
            <b>(<slot name="code">Default Code</slot>)</b>
        </span>
    </div>
</template>

<template id="currencyRateCard">
    <div class="currencyCard">
        <span class="currencyName">
            <slot name="name">Default Name</slot>
        </span>
        <span class="currencyRate">
            <b><slot name="rate">Default Rate</slot></b>
        </span>
    </div>
</template>
