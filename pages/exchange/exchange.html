<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kursy walut</title>
    <link href="./exchange.css" rel="stylesheet"> 
    <script src="./exchange.js" type="module"></script>
    <script src="/scripts/bootstrap.js" type="module"></script>
</head>
<body>
    <app-header></app-header>

    <main>
        <h1>💱 Kursy walut z całego świata!</h1>

        <div class="currencySearchWrapper">
            <label for="currency">Wyszukaj walutę</label><br>
            <input id="currency" name="currency" type="text" placeholder="Wyszukaj kurs waluty">
        </div>

        <div class="availableCurrencies"></div>

        <div class="exchangeRates"></div>

        <dialog id="chartDialog">
            <div class="chartBody">
                <div class="chartSection">
                    <span class="chartTitle"></span>

                    <span class="loader" hidden></span>
                    
                    <form class="dateRangeForm">
                        <input type="date" class="startDate">
                        <input type="date" class="endDate" >
                        <label for="startDate">Początek zakresu</label>
                        <label for="endDate">Koniec zakresu</label>
                    </form>
    
                    <canvas class="currencyChart"></canvas>

                    <input type="number" class="chartCurrencyAmount" placeholder="Ilość waluty">
                    <label for="chartCurrencyAmount">Ilość waluty</label>
                    <button class="buyButton" disabled>Kup</button>

                    <span class="chartCurrencyValue"></span>
                </div>
    
                <button commandfor="chartDialog" command="close">Close</button>
            </div>
        </dialog>
    </main>

    <footer class="footer">
        <div class="footer-inner">
            <p>&copy; 2026 NeonExchange. Wszelkie prawa zastrzeżone.</p>
            <p><a href="#contact">Kontakt</a> · <a href="#about">O nas</a> · <a href="#privacy">Polityka prywatności</a></p>
        </div>
    </footer>
</body>
</html>

<template id="currencyCard">
    <div class="currencyCard">
        <span class="currencyName">
            <slot name="name">Default Name</slot>
        </span>
        <span class="currencyCode">
            <b>(<slot name="code">Default Code</slot>)</b>
        </span>
    </div>
</template>

<template id="currencyRateCard">
    <div class="currencyCard">
        <span class="currencyName">
            <slot name="name">Default Name</slot>
        </span>
        <span class="currencyRate">
            <b><slot name="rate">Default Rate</slot></b>
        </span>
    </div>
</template>
