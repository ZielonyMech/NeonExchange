<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Crete+Round:ital@0;1&family=Jost:ital,wght@0,100..900;1,100..900&family=Pacifico&display=swap" rel="stylesheet">
    <link href="./login.css" rel="stylesheet">
    <script src="/scripts/bootstrap.js" type="module"></script>
    <script src="/pages/auth/login/login.js" type="module" defer></script>
    <title>Logowanie</title>
</head>
<body>
    <app-header></app-header>

    <main>
        <section class="login-section">
            <div class="login-container">
                <h2>🔐 Logowanie</h2>
                <form class="login-form">
                    <div class="form-group">
                        <label for="email">Email:</label>
                        <input type="email" id="email" name="email" required>
                    </div>
                    <div class="form-group">
                        <label for="password">Hasło:</label>
                        <input type="password" id="password" name="password" required>
                    </div>
                    <button type="submit" class="btn">Zaloguj się</button>
                </form>
                <p class="register-link">Nie masz konta? <a href="/pages/auth/register/register.html">Zarejestruj się</a></p>
            </div>
        </section>
    </main>

    <footer class="footer">
        <div class="footer-inner">
            <p>&copy; 2026 NeonExchange. Wszelkie prawa zastrzeżone.</p>
            <p><a href="#contact">Kontakt</a> · <a href="#about">O nas</a> · <a href="#privacy">Polityka prywatności</a></p>
        </div>
    </footer>
</body>
</html>
