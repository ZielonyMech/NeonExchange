<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Crete+Round:ital@0;1&family=Jost:ital,wght@0,100..900;1,100..900&family=Pacifico&display=swap" rel="stylesheet">
    <link href="./register.css" rel="stylesheet">
    <link href="/styles/popups/popup.css" rel="stylesheet">
    <script src="/scripts/bootstrap.js" type="module"></script>
    <script src="/styles/popups/popup.js"></script>
    <script src="/pages/auth/register/register.js" type="module" defer></script>
    <title>Rejestracja</title>
</head>
<body>
    <app-header></app-header>

    <main>
        <section class="register-section">
            <div class="register-container">
                <h2>📝 Rejestracja</h2>
                <form class="register-form">
                    <div class="form-group">
                        <label for="email">Email:</label>
                        <input type="email" id="email" name="email" required>
                    </div>
                    <div class="form-group">
                        <label for="password">Hasło:</label>
                        <input type="password" id="password" name="password" required>
                    </div>
                    <div class="form-group">
                        <label for="confirmPassword">Potwierdź hasło:</label>
                        <input type="password" id="confirmPassword" name="confirmPassword" required>
                    </div>
                    <div class="form-group">
                        <label for="currencySelect">Wybierz walutę</label>
                        <select id="currencySelect" name="currencySelect" required></select>
                    </div>
                    <button type="submit" class="btn">Zarejestruj się</button>
                </form>
                <p class="login-link">Masz konto? <a href="/pages/auth/login/login.html">Zaloguj się</a></p>
            </div>
        </section>
    </main>

    <footer>
        <div class="footer-inner">
            <p>&copy; 2026 NeonExchange. Wszelkie prawa zastrzeżone.</p>
            <p><a href="#contact">Kontakt</a> · <a href="#about">O nas</a> · <a href="#privacy">Polityka prywatności</a></p>
        </div>
    </footer>
</body>
</html>
