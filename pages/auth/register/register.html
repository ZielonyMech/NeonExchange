<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&family=Jost:ital,wght@0,100..900;1,100..900&family=Pacifico&display=swap" rel="stylesheet">
    <link href="./register.css" rel="stylesheet">
    <link href="/styles/footer.css" rel="stylesheet">
    <link href="/styles/popups/popup.css" rel="stylesheet">
    <script src="/scripts/bootstrap.js" type="module"></script>
    <script src="/pages/auth/register/register.js" type="module" defer></script>
    <title>Rejestracja</title>
</head>
<body>
    <app-header role="banner"></app-header>

    <main role="main">
        <section class="register-section">
            <div class="register-container">
                <h2><span aria-hidden="true">📝</span> Rejestracja</h2>
                
                <div id="register-error-message" aria-live="assertive" aria-atomic="true"></div>

                <form class="register-form" novalidate>
                    <div class="form-group">
                        <label for="email">Email:</label>
                        <input type="email" id="email" name="email" required aria-required="true">
                    </div>
                    <div class="form-group">
                        <label for="password">Hasło:</label>
                        <input type="password" id="password" name="password" required aria-required="true">
                    </div>
                    <div class="form-group">
                        <label for="confirmPassword">Potwierdź hasło:</label>
                        <input type="password" id="confirmPassword" name="confirmPassword" required aria-required="true">
                    </div>
                    <div class="form-group">
                        <label for="currencySelect">Wybierz walutę</label>
                        <select id="currencySelect" name="currencySelect" required aria-required="true"></select>
                    </div>
                    <button type="submit" class="btn">Zarejestruj się</button>
                </form>
                <p class="login-link">Masz konto? <a href="/pages/auth/login/login.html">Zaloguj się</a></p>
            </div>
        </section>
    </main>

    <footer role="contentinfo">
        <div class="footer-inner">
            <p>&copy; 2026 NeonExchange. Wszelkie prawa zastrzeżone.</p>
        </div>
    </footer>

</body>
</html>
