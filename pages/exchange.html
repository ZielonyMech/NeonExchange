<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kursy walut</title>
    <link href="./exchange.css" rel="stylesheet"> 
    <script src="./exchange.js" type="module"></script>
    <script src="../scripts/bootstrap.js" type="module"></script>
</head>
<body>
    <app-header></app-header>

    <main>
        <h1>💱 Kursy walut z całego świata!</h1>

        <div class="currencySearchWrapper">
            <label for="currency">Wyszukaj walutę</label><br>
            <input id="currency" name="currency" type="text" placeholder="Wyszukaj kurs waluty">
        </div>

        <div class="availableCurrencies"></div>

        <div class="exchangeRates"></div>

        <dialog id="chartDialog">
            <div class="chartBody">
                <div class="chartArea">
                    <span class="loader" hidden></span>
                    
                    <div class="canvasContainer">
                        <canvas class="currencyChart"></canvas>
                    </div>
                </div>

                <div class="controlPanel">
                    
                    <div class="dateRangeForm">
                        <div class="inputGroup">
                            <label for="startDate">Data początkowa</label>
                            <input type="date" id="startDate" class="startDate">
                        </div>
                        <div class="inputGroup">
                            <label for="endDate">Data końcowa</label>
                            <input type="date" id="endDate" class="endDate">
                        </div>
                    </div>

                    <div class="infoSection">
                        <p class="infoLabel">Wybrano kurs z dnia</p>
                        <p class="infoSubLabel">Kurs</p>
                    </div>

                    <div class="calculatorForm">
                        <label for="chartCurrencyAmount">Wartość do przeliczenia</label>
                        <input type="number" id="chartCurrencyAmount" class="chartCurrencyAmount" placeholder="Value">
                        
                        <button type="button" class="btnPrzelicz">Przelicz</button>
                    </div>

                    <div class="resultSection">
                        <span class="resultLabel">Wartość waluty</span>
                        <span class="chartCurrencyValue">0.1587 CHF</span>
                    </div>

                    <button commandfor="chartDialog" command="close" class="btnClose">Close</button>
                </div>

            </div>
        </dialog>
    </main>

    <footer class="footer">
        <div class="footer-inner">
            <p>&copy; 2026 NeonExchange. Wszelkie prawa zastrzeżone.</p>
            <p><a href="#contact">Kontakt</a> · <a href="#about">O nas</a> · <a href="#privacy">Polityka prywatności</a></p>
        </div>
    </footer>
</body>
</html>
