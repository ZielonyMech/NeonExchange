<template id="app-header-template">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Crete+Round:ital@0;1&family=Jost:ital,wght@0,100..900;1,100..900&family=Pacifico&display=swap');

        :host {
            display: block;
            font-family: 'Crete Round', serif;
        }

        .header {
            width: 100%;
            background: #151515;
            padding: 10px 20px;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            box-sizing: border-box;
            position: relative;
        }

        .header-inner {
            max-width: 1200px;
            width: 100%;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: relative;
        }

        .nav-menu {
            position: absolute;
            top: calc(100% + 8px);
            right: 16px;
            left: auto;
            width: min(260px, calc(100vw - 32px));
            background: #151515;
            border-radius: 10px;
            box-shadow: 0 6px 24px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            padding: 10px;
            box-sizing: border-box;
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease-in-out, opacity 0.3s ease-in-out;
            opacity: 0;
            pointer-events: none;
            z-index: 20;
        }

        .nav-menu.active {
            max-height: 240px;
            opacity: 1;
            pointer-events: auto;
        }

        .nav-menu ul {
            list-style: none;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .nav-menu a {
            color: #f5f7ff;
            text-decoration: none;
            font-family: inherit;
            font-weight: 800;
            font-size: 1rem;
            padding: 14px 16px;
            border-radius: 6px;
            display: block;
            text-align: center;
            transition: all 0.2s ease-in-out;
            letter-spacing: 0.04em;
            line-height: 1.4;
            text-shadow: 0 0 4px rgba(255, 255, 255, 0.12);
        }

        .nav-menu a:hover {
            background: rgba(10, 201, 215, 0.15);
            color: #0ac9d7;
        }

        .hamburger {
            width: 32px;
            height: 26px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            border: none;
            background: transparent;
            cursor: pointer;
            padding: 0;
            margin-left: auto;
            z-index: 2;
        }

        .hamburger span {
            display: block;
            height: 3px;
            background: white;
            border-radius: 2px;
        }

        .brand {
            font-size: 1.25rem;
            font-weight: 900;
            color: #0ac9d7;
            text-shadow: 0 0 16px rgba(10, 201, 215, 0.55);
        }
    </style>

    <header class="header">
        <div class="header-inner">
            <div class="brand"><slot name="brand">NeonExchange<span aria-hidden="true">🔄</span></slot></div>
            <button class="hamburger" id="hamburger" aria-label="Przełącz menu" aria-expanded="false">
                <span></span>
                <span></span>
                <span></span>
            </button>
            <nav class="nav-menu" id="navMenu" aria-label="Główna nawigacja">
                <slot name="nav">
                    <ul>
                        <li><a href="/index.html">Strona główna</a></li>
                        <li><a href="/pages/exchange/exchange.html">Usługi</a></li>
                        <li><a href="#contact">Kontakt</a></li>
                        <li><a id="loginLink" href="/pages/auth/login/login.html">Logowanie</a></li>
                    </ul>
                </slot>
            </nav>
        </div>
    </header>
</template>
